<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>free-minwi</title>
  </head>
  <body>
    <button id="toggle-dark-mode">Toggle Dark Mode</button>
    <button id="clear-data">Clear Data</button>
    <script>
      const toggleButton = document.getElementById('toggle-dark-mode')
      toggleButton.addEventListener('click', () => {
        if (document.body.classList.contains('wgl-theme-dark')) {
          document.body.classList.add('wgl-theme-light')
          document.body.classList.remove('wgl-theme-dark')
        } else {
          document.body.classList.add('wgl-theme-dark')
          document.body.classList.remove('wgl-theme-light')
        }
      })

      const clearButton = document.getElementById('clear-data')
      clearButton.addEventListener('click', () => {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i)
          if (key.startsWith('minwi-')) {
            localStorage.removeItem(key)
          }
        }
        location.reload()
      })
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
